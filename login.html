<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | V-Guard Store</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
</head>

<body>
  <!-- Simplified Navbar for Auth -->
  <nav class="navbar">
    <div class="container" style="justify-content: center;">
      <a href="index.html" class="nav-logo">
        <img src="images/vguard-logo-transparent.png" alt="V-Guard" style="height:48px;">
      </a>
    </div>
  </nav>

  <div id="login-page" class="page-view active-page">
    <div class="page-content">
      <div class="container">
        <div style="max-width: 480px; margin: 40px auto;">
          <div
            style="background: white; border-radius: var(--radius-lg); padding: 40px; box-shadow: var(--shadow-md); border: 1px solid var(--border-light);">
            <div style="text-align: center; margin-bottom: 28px;">
              <h2 style="font-size: 1.5rem; font-weight: 700;">Welcome Back!</h2>
              <p style="color: var(--text-mid); font-size: 0.9rem;">Sign in to your V-Guard account</p>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
              <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="your@email.com" required>
              </div>
              <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password" required>
              </div>
              <button type="submit" class="btn btn-primary btn-block btn-lg">Sign In</button>
            </form>

            <div style="margin-top: 24px; text-align: center;">
              <p style="color: var(--text-mid); font-size: 0.9rem;">Don't have an account?</p>
              <a href="register.html" class="btn btn-outline-dark btn-block" style="margin-top: 12px; display: block; text-decoration: none;">Create New Account</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
