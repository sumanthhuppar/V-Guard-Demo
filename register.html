<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | V-Guard Store</title>
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔴</text></svg>">
  <script src="https://cdn.c360a.salesforce.com/beacon/c360a/efc6bc1c-a8f8-4542-b229-f852449c9797/scripts/c360a.min.js"></script>
</head>

<body>
  <!-- Simplified Navbar for Auth -->
  <nav class="navbar">
    <div class="container" style="justify-content: center;">
      <a href="index.html" class="nav-logo">
        <img src="images/vguard-logo-transparent.png" alt="V-Guard" style="height:48px;">
      </a>
    </div>
  </nav>

  <div id="register-page" class="page-view active-page">
    <div class="page-content">
      <div class="container">
        <div style="max-width: 480px; margin: 40px auto;">
          <div
            style="background: white; border-radius: var(--radius-lg); padding: 40px; box-shadow: var(--shadow-md); border: 1px solid var(--border-light);">
            <div style="text-align: center; margin-bottom: 28px;">
              <h2 style="font-size: 1.5rem; font-weight: 700;">Create Account</h2>
              <p style="color: var(--text-mid); font-size: 0.9rem;">Join V-Guard for exclusive deals & faster checkout
              </p>
            </div>

            <form id="registerFormPage" onsubmit="handleRegisterPage(event)">
              <div class="form-row" style="display:flex; gap:16px;">
                <div class="form-group" style="flex:1;"><label>First Name</label><input type="text" id="regFirstName" required></div>
                <div class="form-group" style="flex:1;"><label>Last Name</label><input type="text" id="regLastName" required></div>
              </div>
              <div class="form-group"><label>Email Address</label><input type="email" id="regEmailPage" required></div>
              <div class="form-group"><label>Password</label><input type="password" id="regPasswordPage" required></div>
              <button type="submit" class="btn btn-primary btn-block btn-lg">Create Account</button>
            </form>

            <div style="margin-top: 24px; text-align: center;">
              <p style="color: var(--text-mid); font-size: 0.9rem;">Already have an account?</p>
              <a href="login.html" class="btn btn-outline-dark btn-block" style="margin-top: 12px; display: block; text-decoration: none;">Sign In</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="js/app.js"></script>
</body>
</html>
